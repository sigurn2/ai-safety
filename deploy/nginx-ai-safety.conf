# Nginx 反代配置：将域名/IP 映射到 Streamlit 8501 端口
# 使用方式：
#   sudo cp nginx-ai-safety.conf /etc/nginx/sites-available/ai-safety
#   sudo ln -sf /etc/nginx/sites-available/ai-safety /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 如需 HTTPS（推荐）：
#   sudo certbot --nginx -d 你的域名

server {
    listen 80;
    server_name _;   # 改为你的域名，例如：ai-safety.example.com

    # Streamlit 需要 WebSocket 支持，否则页面白屏
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket 握手头（必须）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
